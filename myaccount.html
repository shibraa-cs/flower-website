<!DOCTYPE html>
<html>
<head>
    <title>My Account - Eternal Flowers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="designhomepage.css">
    <link rel="icon" type="image/x-icon" href="webimages/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        .account-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .account-header h1 {
            color: #9a238e;
            font-size: 28px;
        }
        .account-header .user-info {
            color: #333 !important;
        }
        .account-header .user-info strong {
            color: #9a238e;
        }
        .order-history {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding: 20px;
        }
        .order-history h2 {
            color: #9a238e;
            margin-bottom: 20px;
        }
        .order-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .order-card:hover {
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .order-date {
            color: #888;
            font-size: 14px;
        }
        .order-total {
            color: #9a238e;
            font-weight: bold;
            font-size: 18px;
        }
        .order-items {
            padding-left: 20px;
            color: #555 !important;
        }
        .order-items li {
            margin: 5px 0;
            color: #555 !important;
        }
        .no-orders {
            text-align: center;
            padding: 40px;
            color: #333 !important;
        }
        .no-orders h3 {
            color: #9a238e;
            font-size: 22px;
        }
        .no-orders p {
            color: #333 !important;
            font-size: 16px;
        }
        .no-orders a {
            color: #9a238e;
            text-decoration: none;
            font-weight: bold;
        }
        .no-orders a:hover {
            text-decoration: underline;
        }
        .sign-out-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .sign-out-btn:hover {
            background: #c0392b;
        }
        .shop-now-btn {
            background: #9a238e;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .shop-now-btn:hover {
            background: #7a1a6e;
        }
        @media (max-width: 600px) {
            .account-header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <a href="index.html"> <img id="logo" src="webimages/logo.png" width="125px"> </a>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
        </ul>
        <a href="shoppingcart.html">🛒 Cart</a>      
    </nav>
</div>

<div class="hero-image">
    <div class="hero-text">
        <h1 style="font-size:50px">My Account</h1>
        <p style="padding:15px">View your order history and account details.</p>
    </div>
</div>

<div class="account-container" id="account-container">
    <!-- Will be populated by JavaScript -->
</div>

<footer>
    <div class="container">
        <div class="footer-content">
            <div class="footer-info">
                <h3>Contact Information</h3>
                <p>123 Flower Street, City</p>
                <p>Phone: (123) 456-7890</p>
                <p>Email: info@eternalflowers.com</p>
            </div>
            <div class="footer-social">
                <h3>Follow Us</h3>
                <ul>
                    <li><a href="#"><img src="webimages/facebook.png" alt="Facebook"></a></li>
                    <li><a href="#"><img src="webimages/twitter.png" alt="Twitter"></a></li>
                    <li><a href="#"><img src="webimages/instagram.png" alt="Instagram"></a></li>
                </ul>
            </div>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 Eternal Flowers. All rights reserved. | Designed by Shibraa Nawaz</p>
    </div>
</footer>

<script src="script.js"></script>
<script>
    // Get current user
    function getCurrentUser() {
        const userData = localStorage.getItem('currentUser');
        if (userData) {
            return JSON.parse(userData);
        }
        return null;
    }

    // Get full user data
    function getUserData(email) {
        let users = JSON.parse(localStorage.getItem('flowerUsers')) || [];
        for (let user of users) {
            if (user.email === email) {
                return user;
            }
        }
        return null;
    }

    // Sign out
    function signOut() {
        localStorage.removeItem('currentUser');
        alert('You have been signed out.');
        window.location.href = 'index.html';
    }

    // Display account page
    function displayAccount() {
        const container = document.getElementById('account-container');
        const currentUser = getCurrentUser();
        
        if (!currentUser) {
            container.innerHTML = `
                <div style="text-align:center;padding:60px 20px;background:white;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,0.05);">
                    <h2 style="color:#9a238e;">Please Sign In</h2>
                    <p style="color:#333;margin:20px 0;">You need to be signed in to view your account.</p>
                    <a href="signin.html" style="background:#9a238e;color:white;padding:12px 40px;border-radius:30px;text-decoration:none;">Sign In</a>
                    <p style="margin-top:10px;color:#333;"><a href="index.html" style="color:#9a238e;">Continue as Guest</a></p>
                </div>
            `;
            return;
        }
        
        const userData = getUserData(currentUser.email);
        const orders = userData && userData.orders ? userData.orders : [];
        
        let orderHtml = '';
        if (orders.length === 0) {
            orderHtml = `
                <div class="no-orders">
                    <h3>🛒 No orders yet</h3>
                    <p>Browse our <a href="products.html">beautiful flowers</a> and place your first order!</p>
                    <br>
                    <a href="products.html" class="shop-now-btn">🌸 Shop Now</a>
                </div>
            `;
        } else {
            orderHtml = orders.map((order, index) => `
                <div class="order-card">
                    <div class="order-header">
                        <span><strong style="color:#333;">Order #${index + 1}</strong></span>
                        <span class="order-date">📅 ${order.date}</span>
                    </div>
                    <ul class="order-items">
                        ${order.items.map(item => 
                            `<li>🌸 ${item.name} × ${item.quantity} = £${(item.price * item.quantity).toFixed(2)}</li>`
                        ).join('')}
                    </ul>
                    <div class="order-total">Total: £${order.total.toFixed(2)}</div>
                </div>
            `).join('');
        }
        
        container.innerHTML = `
            <div class="account-header">
                <div>
                    <h1>👤 Welcome, ${currentUser.name}!</h1>
                    <p class="user-info"><strong>Email:</strong> ${currentUser.email}</p>
                    ${currentUser.role === 'admin' ? '<p style="color:#e74c3c;font-weight:bold;">🔐 Admin Account</p>' : ''}
                </div>
                <div>
                    <a href="index.html" class="shop-now-btn">🏠 Home</a>
                    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
                </div>
            </div>
            
            <div class="order-history">
                <h2>📦 Order History</h2>
                ${orderHtml}
            </div>
        `;
    }

    // Load account page
    displayAccount();
</script>

</body>
</html>
